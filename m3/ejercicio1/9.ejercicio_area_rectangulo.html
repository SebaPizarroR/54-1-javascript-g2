<script>

    //SOLICITAR A UN USUARIO LOS DATOS NECESARIOS PARA CALCULAR EL ÁREA DE UN RECTANGULO

    //ALERT, PROMPT, VARIABLES, CONVERSIÓN DE TIPOS

    let base = Number(prompt("Ingrese la base del rectangulo en cms"));
    let altura = Number(prompt("Ingrese la altura del rectangulo en cms"));

    let area = base * altura;
    
    alert(`El área del rectángulo es: ${area.toFixed(2)} cms.`);



</script>
