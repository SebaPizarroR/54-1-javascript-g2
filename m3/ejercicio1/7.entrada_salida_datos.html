<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>

        //PROMPT SOLICITA EL INGRESO DE DATOS EN UNA VENTANA EMERGENTE
        let numero1 = prompt("Ingresa el primer valor a sumar:");
        let numero2 = prompt("Ingresa el segundo valor a sumar:");

        numero1 = Number(numero1);
        numero2 = Number(numero2);

        let suma = numero1 + numero2;

        //OCUPAMOS ALERT PARA DESPLEGAR UNA VENTANA EMERGENTE CON UNA SALIDA DE DATOS
        alert(`El resultado de la suma de ${numero1} + ${numero2} es: ${suma}`);


    </script>

</head>

</body>
</html>
